[pytest]
# Root pytest configuration for ConsultaRPP
pythonpath = backend
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings

norecursedirs = .git .venv backend/app/__pycache__ backend/__pycache__ data backups node_modules frontend scripts
